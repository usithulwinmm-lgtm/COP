<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto-Onchain Pro - Transaction</title>
    <link rel="shortcut icon" href="./img/Logo.jpg" type="image/svg+xml">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="transaction.css">
</head>
<body class="min-h-screen">
    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#1e2329] sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-yellow-500 rounded flex items-center justify-center font-bold text-black"><img src="./img/Logo.jpg" width="50" height="50"></div>
            <span class="text-lg font-bold tracking-tighter text-white-500" data-lang="logo">Crypto-Onchain Pro</span>
        </div>

            <div class="flex items-center gap-4 text-gray-400">

                <div class="flex items-center gap-4 text-gray-400 border-r border-gray-700 pr-4">
    <button onclick="openLanguageModal()" class="hover:text-blue-500 flex items-center gap-1 transition">
        <i class="fa-solid fa-globe"></i>
        <span id="display-lang" class="text-xs font-bold uppercase">EN</span>
    </button>
</div>

<div id="language-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
    <div class="bg-[#1e2329] border border-gray-700 w-full max-w-md rounded-xl shadow-2xl overflow-hidden">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-white">Select Language</h3>
            <button onclick="closeLanguageModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-4">
            <div class="relative mb-4">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="text" id="lang-search" placeholder="Search language..." 
                       class="w-full bg-[#0b0e11] border border-gray-700 rounded-lg py-2 pl-10 pr-4 text-white focus:outline-none focus:border-yellow-500"
                       oninput="searchLanguage()">
            </div>
            <div id="lang-options" class="max-h-[350px] overflow-y-auto grid grid-cols-2 gap-2 custom-select">
                </div>
        </div>
    </div>
</div>

<div class="relative" id="userMenuWrapper">
            <button onclick="toggleUserDropdown(event)" class="w-5 h-5 rounded-full bg-[#2b3139] border border-gray-700 flex items-center justify-center hover:border-blue-500 transition">
                <i class="fa-solid fa-user text-gray-100"></i>
            </button>
            
            <div id="userDropdown" class="user-dropdown-menu">
    <div class="p-4 border-b border-gray-800">
        <p class="text-xs text-gray-400 uppercase font-bold tracking-wider">Account Settings</p>
    </div>

    <div class="py-2 max-h-[400px] overflow-y-auto custom-scrollbar">
        <button onclick="window.location.href='accountsetting.html?tab=profile'" class="dropdown-nav-item">
            <i class="fas fa-user-circle w-5 text-center"></i> User Identity
        </button>

        <button onclick="window.location.href='accountsetting.html?tab=verifications'" class="dropdown-nav-item">
            <i class="fas fa-id-card w-5 text-center"></i> Verifications
        </button>

        <button onclick="window.location.href='accountsetting.html?tab=security'" class="dropdown-nav-item">
            <i class="fas fa-shield-alt w-5 text-center"></i> Password and Security
        </button>

        <button onclick="window.location.href='portfolio.html'" class="dropdown-nav-item" data-tab-btn="financial">
            <i class="fas fa-wallet w-5 text-center"></i> Wallet
        </button>

        <button onclick="window.location.href='accountsetting.html?tab=payments'" class="dropdown-nav-item">
            <i class="fas fa-credit-card w-5 text-center"></i> Cards
        </button>

        <button onclick="handleWalletClick(event)" class="dropdown-nav-item">
            <i class="fas fa-exchange-alt w-5 text-center"></i> Transactions
        </button>

        <button onclick="window.location.href='history.html'" class="dropdown-nav-item" data-tab-btn="financial">
            <i class="fas fa-clock-rotate-left w-5 text-center"></i> History
        </button>

        <button onclick="window.location.href='accountsetting.html?tab=notifications'" class="dropdown-nav-item">
            <i class="fas fa-bell w-5 text-center"></i> Notifications
        </button>

        <div class="border-t border-gray-800 my-2"></div>

        <button class="dropdown-nav-item text-red-500 hover:bg-red-500/10">
            <i class="fas fa-sign-out-alt w-5 text-center"></i> Log Out
        </button>
    </div>
</div>
        </div>

                <div class="relative group">
    <button class="hover:text-blue-500 transition flex items-center gap-1 font-bold text-sm">
        <i class="fa-solid fa-bars"></i> <span></span> <i class="fas fa-chevron-down text-[10px]"></i>
    </button>
    
    <div class="absolute right-0 mt-2 w-48 bg-[#1e2329] border border-gray-800 rounded-lg shadow-2xl hidden group-hover:block z-[100]">
        <div class="py-2">
            <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">Home</a>
            <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">Trade</a>
            <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">Future</a>
            <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">About</a>
            <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">Contact</a>
            
            <div class="relative group/sub">
                <div class="flex justify-between items-center px-4 py-2 hover:bg-[#2b3139] text-sm cursor-pointer transition">
                    <span>Discover</span>
                    <i class="fas fa-chevron-right text-[10px]"></i>
                </div>
                
                <div class="absolute right-full top-0 mr-1 w-48 bg-[#1e2329] border border-gray-800 rounded-lg shadow-2xl hidden group-hover/sub:block">
                    <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">Our Team</a>
                    <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">Our Feature</a>
                    <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">Our Offer</a>
                    <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">Our Services</a>
                    <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">Company News</a>
                    <a href="#" class="block px-4 py-2 hover:bg-[#2b3139] text-sm transition">FAQs</a>
                </div>
            </div>
        </div>
    </div>
</div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">

        <div class="glass-card p-4 grid grid-cols-2 md:grid-cols-4 gap-4">
        <div>
            <label class="block text-[10px] text-gray-500 mb-1 uppercase">Type</label>
            <select id="filter-type" onchange="renderHistory()" class="w-full bg-[#181a20] border border-gray-700 rounded p-2 text-sm outline-none">
                <option value="all">All Types</option>
                <option value="deposit">Deposit</option>
                <option value="withdraw">Withdrawal</option>
                <option value="transfer">Transfer</option>
            </select>
        </div>
        <div>
            <label class="block text-[10px] text-gray-500 mb-1 uppercase">Asset</label>
            <select id="filter-asset" onchange="renderHistory()" class="w-full bg-[#181a20] border border-gray-700 rounded p-2 text-sm outline-none">
                <option value="all">All Assets</option>
            </select>
        </div>
        <div>
            <label class="block text-[10px] text-gray-500 mb-1 uppercase">Status</label>
            <select id="filter-status" onchange="renderHistory()" class="w-full bg-[#181a20] border border-gray-700 rounded p-2 text-sm outline-none">               
                <option value="all">All Status</option>
                <option value="all">Completed</option>
                <option value="processing">Processing</option>
                <option value="failed">Failed</option>
            </select>
        </div>
        <div>
            <label class="block text-[10px] text-gray-500 mb-1 uppercase">Time</label>
            <select id="filter-time" onchange="renderHistory()"class="w-full bg-[#181a20] border border-gray-700 rounded p-2 text-sm outline-none">
                <option value="all">All Time</option>
                <option value="30">Last 30 Days</option>
                <option value="90">Last 90 Days</option>
                <option value="all">Custom Range</option>
            </select>
        </div>
    </div>

<div class="portfolio-card rounded-2xl overflow-hidden border border-gray-800/50">
    <div class="p-4 border-b border-gray-800/30 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="font-bold">Transaction History</div>
        
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                <input type="text" id="historySearch" onkeyup="searchHistory()" placeholder="Search assets or side..." 
                    class="bg-black/20 border border-gray-700 rounded-lg py-1.5 pl-9 pr-4 text-xs focus:outline-none focus:border-blue-500 w-full">
            </div>
        </div>
    </div>
    
    <div class="bg-[var(--card-bg)] rounded-2xl border border-gray-800/50 overflow-hidden">
    <div class="history-table-container">
        <table class="w-full text-left border-collapse">
            <thead class="bg-black/20 text-gray-400 text-[11px] uppercase tracking-wider sticky-header">
                <tr>
                    <th class="p-4">Date & Time</th>
                    <th class="p-4">Asset Pair</th>
                    <th class="p-4">Side/Type</th>
                    <th class="p-4 text-right">Execution Price</th>
                    <th class="p-4 text-right">Filled Amount</th>
                    <th class="p-4 text-right">Total (USDT)</th>
                    <th class="p-4 text-center">Details</th>
                </tr>
            </thead>
            <tbody id="history-body" class="divide-y divide-gray-800/30">
                </tbody>
        </table>
    </div>
</div>
        </div>
    </main>

    <div id="details-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[110] p-4 backdrop-blur-sm">
    <div class="bg-[var(--card-bg)] w-full max-w-md rounded-2xl p-6 border border-gray-700 shadow-2xl animate-fadeIn">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-blue-500">Transaction Details</h3>
            <button onclick="closeDetailsModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
        </div>
        <div id="details-content" class="space-y-4 font-mono text-sm">
            </div>
        <button onclick="closeDetailsModal()" class="w-full mt-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-500 transition-all">Close</button>
    </div>
</div>


    <script src="transaction.js"></script>

    
</body>
</html>
